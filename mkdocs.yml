site_name: Verdikta Dispatcher Smart Contracts
site_description: Smart contract documentation for the Verdikta Dispatcher ecosystem

# Docs directory (set to docs subdirectory)
docs_dir: docs

theme:
  name: material

nav:
  - Home: index.md
  - Contracts:
    - ReputationAggregator: contracts/reputation-aggregator.md
    - ReputationSingleton: contracts/reputation-singleton.md
    - ReputationKeeper: contracts/reputation-keeper.md
    - ArbiterOperator: contracts/arbiter-operator.md
    - SimpleContract: contracts/simple-contract.md
  - Examples:
    - Overview: examples/index.md
  - API Reference:
    - Overview: api/index.md
    - Auto-Generated Contract APIs: api/generated/index.md

markdown_extensions:
  - admonition
  - codehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed
  - pymdownx.details
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true 